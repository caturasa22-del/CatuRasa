<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caturasa - Card Game Fullscreen</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url("/assets/sisa/gameBG.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

  <script>
    let deck = [];
    let discardPile = [];
    let playerHand = [];

    let suits = ["♠", "♥", "♦", "♣"];

    // Base card dimensions
    let cardW, cardH;

    let gameState = "start";
    let instructionPage = 1;
    let totalInstructionPages = 5;
    let dishIcon;
    let dessertIcon;
    let snackIcon;
    let iconSize;
    let autoPreviewPhase = 0;

    let cardImages = {};
    let backImage;
    let titleImage; // Added for the image title logo

    let autoPreviewMode = false;
    let autoPreviewStep = 0;
    let autoPreviewType = "";

    let tutorialOffsetX = 0;
    let previewCard = null;
    let myFont2;

    // Variabel global untuk menampung file musik
    let bgm;

    // PRELOAD
    function preload() {
      myFont2 = loadFont('assets/font/Poppins-Medium.ttf');

      // Memuat file audio Anda.
      bgm = loadSound('assets/BGM.mp4');

      // Memuat gambar logo judul pengganti teks
      titleImage = loadImage("assets/LLOGO-06.png"); 

      let suitMap = { "♠": "J", "♥": "K", "♦": "S", "♣": "M" };

      for (let suit of suits) {
        for (let value = 1; value <= 13; value++) {
          let label = getLabel(value);
          let filename = label + suitMap[suit] + ".png";
          cardImages[label + suit] = loadImage("assets/cards/" + filename);
        }
      }
      dishIcon = loadImage("assets/cards/icon_dish.png");
      dessertIcon = loadImage("assets/cards/icon_dessert.png");
      snackIcon = loadImage("assets/cards/icon_snack.png");
      backImage = loadImage("assets/cards/BG.png");
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      calculateResponsiveSizes();
      textFont(myFont2);

      // Setel musik agar berputar terus (loop) dan atur volumenya (0.0 sampai 1.0)
      bgm.loop();
      bgm.setVolume(0.3); 
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      calculateResponsiveSizes();
    }

    function calculateResponsiveSizes() {
      cardH = height * 0.25;
      cardW = cardH * (100 / 150); 
      iconSize = cardH * 0.8; 
    }

    // DRAW LOOP
    function draw() {
      background(20, 120, 70);

      if (gameState === "start") {
        drawStartScreen();
        return;
      }

      if (gameState === "menu") {
        drawMenuScreen();
        return;
      }

      if (gameState === "instructions") { 
        drawInstructionsScreen();

        if (previewCard) {
          drawPreviewCard();
        }
        if (autoPreviewMode) {
          drawBottomCardTutorial();
        }
        return;
      }
    }

    function drawStartScreen() {
      clear();

      // Menghitung ukuran logo gambar secara responsif berdasarkan tinggi layar
      let titleH = height * 0.18; // Mengatur tinggi logo relatif terhadap layar (bisa disesuaikan)
      
      // === OTOMATIS: Lebar mengikuti proporsi tinggi gambar asli tanpa hardcode ===
      let titleW = titleH * (titleImage.width / titleImage.height); 
      
      // Memposisikan logo di tengah layar secara horizontal dan vertical yang seimbang
      let titleX = width / 2 - titleW / 2;
      let titleY = height * 0.25; 
      
      // Menggambar logo judul
      image(titleImage, titleX, titleY, titleW, titleH);

      // Tombol Mulai Permainan
      let btnW = width * 0.25;
      let btnH = height * 0.1;
      let btnX = width / 2 - btnW / 2;
      let btnY = height * 0.55;
      
      fill(200);
      rect(btnX, btnY, btnW, btnH, 20);

      fill(0);
      textSize(height * 0.035);
      textAlign(CENTER, CENTER);
      text("Mulai Permainan", width / 2, btnY + btnH / 2);
    }

    function drawMenuScreen() {
      clear();

      let w = width * 0.18;
      let h = height * 0.12;
      let gap = width * 0.03;

      let totalW = w * 2 + gap;
      let startX = width / 2 - totalW / 2;
      let y = height / 2 - h / 2;

      textAlign(CENTER, CENTER);
      textSize(height * 0.035);

      // LEFT button (Tutorial)
      fill(200);
      rect(startX, y, w, h, 15);
      fill(0);
      text("Tutorial", startX + w / 2, y + h / 2);

      // RIGHT button (Mulai)
      let rightBtnX = startX + w + gap;
      fill(200);
      rect(rightBtnX, y, w, h, 15);
      fill(0);
      text("Mulai", rightBtnX + w / 2, y + h / 2);
    }

    function drawInstructionsScreen() {
      clear();

      fill(255);
      textAlign(CENTER, TOP);
      textSize(height * 0.06);
      text("Peraturan Bermain", width / 2 + tutorialOffsetX, height * 0.08);

      if (previewCard) {
        tutorialOffsetX = lerp(tutorialOffsetX, -width * 0.15, 0.1);
      } else {
        tutorialOffsetX = lerp(tutorialOffsetX, 0, 0.1);
      }
      
      let textY = height * 0.22;
      let contentSize = height * 0.03;
      textSize(contentSize);

      // === PAGE CONTENT ===
      if (instructionPage === 1) {
        text("Caturasa merupakan permainan kartu dimana tujuan pemain adalah \n" + "mengumpulkan makanan dari wilayah yang sama untuk memperoleh poin tertinggi. ", width / 2, textY);
      } 
      else if (instructionPage === 2) {
        text("Dalam 1 deck Caturasa ada total 52 kartu", width / 2, textY);
      }
      else if (instructionPage === 3) {
        text("Dari 52 kartu tersebut terbagi menjadi 4 kategori yang \n" + "mewakili beberapa daerah di Indonesia (klik kartu untuk memperbesar gambar)", width / 2 + tutorialOffsetX, textY);
        drawCategoryCards();
      }
      else if (instructionPage === 4) {
        text("Dalam 1 kategori terdapat 13 kartu dengan 3 jenis \n" +  "simbol yang berbeda (klik kartu untuk memperbesar gambar)", width / 2 + tutorialOffsetX, textY);
        drawIconCards();
      }
      else if (instructionPage === 5) {
        text("Simbol-simbol tersebut melambangkan jenis\n"+ "makanan yang terdapat dalam kartu.", width / 2, textY);
        drawIconSymbol();
      }
      
      // === BUTTONS ===
      drawInstructionButtons();
    }

    function drawCategoryCards() {
      let y = height * 0.4;
      let spacing = width * 0.02;
      let totalWidth = cardW * 4 + spacing * 3;
      let startX = width / 2 - totalWidth / 2 + tutorialOffsetX;
      let suitKeys = ["A♠", "A♥", "A♦", "A♣"];
      let names = ["Jawa", "Kalimantan", "Sumatra", "Modern"];

      for (let i = 0; i < 4; i++) {
        let x = startX + i * (cardW + spacing);
        let hovering = mouseX > x && mouseX < x + cardW && mouseY > y && mouseY < y + cardH;

        if (hovering) {
          let zoom = 1.15;
          let newW = cardW * zoom, newH = cardH * zoom;
          image(cardImages[suitKeys[i]], x - (newW - cardW) / 2, y - (newH - cardH) / 2, newW, newH);
        } else {
          image(cardImages[suitKeys[i]], x, y, cardW, cardH);
        }
      }

      textSize(height * 0.025);
      textAlign(CENTER, TOP);
      fill(255);
      for (let i = 0; i < 4; i++) {
        text(names[i], startX + i * (cardW + spacing) + cardW / 2, y + cardH + height * 0.02);
      }
    }

    function drawIconCards() {
      let y = height * 0.4;
      let spacing = width * 0.02;

      let suitKeys = ["A♠", "7♠", "6♠"];
      let names = ["10 Poin", "6 Poin", "4 Poin"];

      let totalWidth = cardW * suitKeys.length + spacing * (suitKeys.length - 1);
      let startX = width / 2 - totalWidth / 2 + tutorialOffsetX;

      for (let i = 0; i < suitKeys.length; i++) {
        let x = startX + i * (cardW + spacing);
        let hovering = mouseX > x && mouseX < x + cardW && mouseY > y && mouseY < y + cardH;

        if (hovering) {
          let zoom = 1.15;
          let newW = cardW * zoom, newH = cardH * zoom;
          image(cardImages[suitKeys[i]], x - (newW - cardW) / 2, y - (newH - cardH) / 2, newW, newH);
        } else {
          image(cardImages[suitKeys[i]], x, y, cardW, cardH);
        }
      }

      textSize(height * 0.025);
      textAlign(CENTER, TOP);
      fill(255);

      for (let i = 0; i < suitKeys.length; i++) {
        text(names[i], startX + i * (cardW + spacing) + cardW / 2, y + cardH + height * 0.02);
      }
    }

    function drawIconSymbol() {
      let y = height * 0.4;
      let spacing = width * 0.04;

      let icons = [dishIcon, dessertIcon, snackIcon];
      let names = [
        "Makanan Berat\n" + "10 Poin",
        "Minuman dan \n" + "makanan penutup\n" + "6 Poin",
        "Makanan Ringan\n" + "4 Poin",
      ];

      let totalWidth = iconSize * icons.length + spacing * (icons.length - 1);
      let startX = width / 2 - totalWidth / 2 + tutorialOffsetX;

      for (let i = 0; i < icons.length; i++) {
        let x = startX + i * (iconSize + spacing);
        let hovering = mouseX > x && mouseX < x + iconSize && mouseY > y && mouseY < y + iconSize;

        if (hovering) {
          let zoom = 1.15;
          let newSize = iconSize * zoom;
          image(icons[i], x - (newSize - iconSize) / 2, y - (newSize - iconSize) / 2, newSize, newSize);
        } else {
          image(icons[i], x, y, iconSize, iconSize);
        }
      }

      textSize(height * 0.023);
      textAlign(CENTER, TOP);
      fill(255);

      for (let i = 0; i < icons.length; i++) {
        let textX = startX + i * (iconSize + spacing) + iconSize / 2;
        text(names[i], textX, y + iconSize + height * 0.02);
      }
    }

    function drawInstructionButtons() {
      let w = width * 0.15;
      let h = height * 0.08;
      let y = height * 0.85;
      let gap = width * 0.03;

      let totalW = w * 2 + gap;
      let startX = width / 2 - totalW / 2 + tutorialOffsetX;

      textAlign(CENTER, CENTER);
      textSize(height * 0.028);

      // BACK button
      if (instructionPage > 1) {
        fill(200);
        rect(startX, y, w, h, 15);
        fill(0);
        text("Kembali", startX + w / 2, y + h / 2);
      } else if (instructionPage === 1) {
        // Draw back button to menu when on first page
        fill(200);
        rect(startX, y, w, h, 15);
        fill(0);
        text("Menu", startX + w / 2, y + h / 2);
      }

      // NEXT button
      let nextX = startX + w + gap;
      fill(200);
      rect(nextX, y, w, h, 15);

      fill(0);
      if (instructionPage < totalInstructionPages) {
        text("Lanjut", nextX + w / 2, y + h / 2);
      } else {
        text("Mulai", nextX + w / 2, y + h / 2);
      }
    }

    function drawPreviewCard() {
      let bigW = cardW * 3;
      let bigH = cardH * 3;
      let x = width - bigW - width * 0.05;
      let y = height / 2 - bigH / 2;
      image(previewCard.img, x, y, bigW, bigH);
    }

    function drawBottomCardTutorial() {
      let bigW = cardW * 3;
      let bigH = cardH * 3;
      let x = width - bigW - width * 0.05;
      let y = height / 2 - bigH / 2;

      fill(0, 0, 0, 180);
      noStroke();
      rect(0, 0, width, height);

      image(previewCard.img, x, y, bigW, bigH);

      noFill();
      stroke(255, 0, 0);
      strokeWeight(5);

      if (autoPreviewType === "top") {
        rect(x + bigW * 0.05, y + bigH * 0.68, bigW * 0.9, bigH * 0.28, 15);
      }
      else if (autoPreviewType === "middle") {
        rect(x + bigW * 0.05, y + bigH * 0.59, bigW * 0.9, bigH * 0.1, 15);
      }  
      else if (autoPreviewType === "bottom") {
        rect(x + bigW * 0.04, y + bigH * 0.13, bigW * 0.23, bigH * 0.15, 15);
      }

      let txt = "";

      if (autoPreviewType === "top") {
        if (autoPreviewStep === 0) txt = "Asal daerah dari makanan tersebut dapat dilihat di bagian bawah kartu.";
        else if (autoPreviewStep === 1) txt = "Wilayah tersebut ditunjukkan oleh bagian berwarna pada peta Indonesia";
        else if (autoPreviewStep === 2) txt = "Masing-masing daerah juga memiliki warna yang berbeda";
      }
      else if (autoPreviewType === "middle") {
        if (autoPreviewStep === 0) txt = "Terdapat informasi di bawah ilustrasi kartu";
        else if (autoPreviewStep === 1) txt = "Informasi tersebut berada di dalam kotak berwarna";
        else if (autoPreviewStep === 2) txt = "Tercantum bahan utama makanan, rasa dominan, dan asal daerahmakanan tersebut";
      }
      else if (autoPreviewType === "bottom") {
        if (autoPreviewStep === 0) txt = "Simbol dapat dilihat di bagian pojok kiri kartu";
        else if (autoPreviewStep === 1) txt = "Setiap simbol mengkategorikan jenis makanan yang berbeda";
        else if (autoPreviewStep === 2) txt = "Simbol tersebut juga memiliki jumlah poin yang berbeda";
      }

      drawAutoPreviewBox(txt, x);
    }

    function drawAutoPreviewBox(txt, cardX) {
      let w = width * 0.32;
      let h = height * 0.24;
      
      let gap = width * 0.02;
      let x = cardX - w - gap;
      let y = height / 2 - h / 2;

      fill(255);
      noStroke();
      rect(x, y, w, h, 20);

      fill(0);
      textAlign(LEFT, TOP);
      textSize(height * 0.026);
      text(txt, x + 20, y + 20, w - 40);

      fill(120);
      textSize(height * 0.018);
      text("Klik dimana saja untuk lanjut", x + 20, y + h - 35);
    }

    // ================= INPUT =================
    function mousePressed() {
      // Menangani Autoplay Policy dari Browser Modern.
      if (getAudioContext().state !== 'running') {
        getAudioContext().resume();
      }

      if (gameState === "start") {
        gameState = "menu";
        return;
      }

      if (gameState === "menu") {
        let w = width * 0.18;
        let h = height * 0.12;
        let gap = width * 0.03;
        let totalW = w * 2 + gap;
        let startX = width / 2 - totalW / 2;
        let y = height / 2 - h / 2;

        // Klik tombol Tutorial
        if (mouseX > startX && mouseX < startX + w && mouseY > y && mouseY < y + h) {
          gameState = "instructions";
          instructionPage = 1;
          return;
        }

        // Klik tombol Mulai di Menu Screen
        if (mouseX > startX + w + gap && mouseX < startX + w + gap + w && mouseY > y && mouseY < y + h) {
          window.location.href = "main.html";
          return;
        }
      }

      if (gameState === "instructions") {
        if (autoPreviewMode) {
          autoPreviewStep++;
          if (autoPreviewStep > 2) {
            if (instructionPage === 3 && autoPreviewPhase === 0) {
              autoPreviewPhase = 1;
              autoPreviewStep = 0;
              autoPreviewType = "middle";
              return;
            }
            autoPreviewMode = false;
            previewCard = null;
            instructionPage++;
            return;
          }
          return;
        }
        
        let w = width * 0.15;
        let h = height * 0.08;
        let y = height * 0.85;
        let gap = width * 0.03;
        let clickedCard = null;
        
        if (instructionPage === 3) {
          clickedCard = getClickedCategoryCard(mouseX, mouseY);
        }
        else if (instructionPage === 4) {
          clickedCard = getClickedIconCard(mouseX, mouseY);
        }

        if (clickedCard) {
          if (previewCard && previewCard.img === clickedCard.img) {
            previewCard = null;
          } else {
            previewCard = clickedCard;
          }
          return;
        }
        
        let totalW = w * 2 + gap;
        let startX = width / 2 - totalW / 2 + tutorialOffsetX;
        let backX = startX;
        let nextX = startX + w + gap;

        // BACK button interaction
        if (mouseX > backX && mouseX < backX + w && mouseY > y && mouseY < y + h) {
          if (instructionPage > 1) {
            instructionPage--;
          } else {
            gameState = "menu";
          }
          previewCard = null;
          return;
        }      

        // NEXT / START button interaction
        if (mouseX > nextX && mouseX < nextX + w && mouseY > y && mouseY < y + h) {
          if (instructionPage === 3) {
            autoPreviewMode = true;
            previewCard = { img: cardImages["A♠"] };
            autoPreviewType = "top";
            autoPreviewPhase = 0;
            autoPreviewStep = 0;
            return;
          }

          if (instructionPage === 4) {
            autoPreviewMode = true;
            previewCard = { img: cardImages["A♠"] };
            autoPreviewType = "bottom";
            autoPreviewStep = 0;
            return;
          }

          if (instructionPage < totalInstructionPages) {
            instructionPage++;
            previewCard = null;
          } else {
            previewCard = null;
            window.location.href = "tutorinter.html";
          }
          return;
        }
      }
    }

    function getClickedCategoryCard(mx, my) {
      let y = height * 0.4;
      let spacing = width * 0.02;
      let totalWidth = cardW * 4 + spacing * 3;
      let startX = width / 2 - totalWidth / 2 + tutorialOffsetX;
      let suitKeys = ["A♠", "A♥", "A♦", "A♣"];

      for (let i = 0; i < 4; i++) {
        let x = startX + i * (cardW + spacing);
        if (mx > x && mx < x + cardW && my > y && my < y + cardH) {
          return { img: cardImages[suitKeys[i]] };
        }
      }
      return null;
    }

    function getClickedIconCard(mx, my) {
      let y = height * 0.4;
      let spacing = width * 0.02;
      let totalWidth = cardW * 3 + spacing * (3 - 1);
      let startX = width / 2 - totalWidth / 2 + tutorialOffsetX;
      let suitKeys = ["A♠", "7♠", "6♠"];

      for (let i = 0; i < 3; i++) {
        let x = startX + i * (cardW + spacing);
        if (mx > x && mx < x + cardW && my > y && my < y + cardH) {
          return { img: cardImages[suitKeys[i]] };
        }
      }
      return null;
    }

    function getLabel(value) {
      if (value === 1) return "A";
      if (value === 11) return "J";
      if (value === 12) return "Q";
      if (value === 13) return "K";
      return value.toString();
    }
  </script>
</body>
</html>
